<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>页面管理后台</title>
<style>
:root{--brand:#E31E24;--brand-light:#FDEBEC;--bg:#f3f4f6;--card:#fff;--fg:#111;--muted:#6b7280;--border:#e5e7eb;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--fg)}
.app{display:flex;min-height:100vh}

/* 侧边栏 */
.sidebar{width:200px;background:var(--card);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
.sidebar h2{font-size:14px;font-weight:700;padding:0 20px 16px;color:var(--fg)}
.sidebar nav{flex:1}
.sidebar a{display:flex;align-items:center;gap:8px;padding:10px 20px;font-size:13px;color:var(--muted);text-decoration:none;transition:all .15s;border-left:2px solid transparent}
.sidebar a:hover{color:var(--fg);background:#f9fafb}
.sidebar a.active{color:var(--brand);font-weight:600;background:var(--brand-light);border-left-color:var(--brand)}
.sidebar a svg{width:16px;height:16px;opacity:.6}
.sidebar-footer{padding:12px 20px;border-top:1px solid var(--border)}
.sidebar-footer a{font-size:12px;color:var(--muted);text-decoration:none}
.sidebar-footer a:hover{color:var(--brand)}

/* 主内容 */
.main{flex:1;padding:24px 32px;max-width:780px}
.panel{display:none}
.panel.active{display:block}
.panel h2{font-size:18px;font-weight:700;margin-bottom:4px}
.panel .desc{font-size:13px;color:var(--muted);margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:12px}
.card h3{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.card h3 .hint{font-size:11px;color:var(--muted);font-weight:400}
label{display:block;font-size:12px;font-weight:550;color:var(--muted);margin-bottom:4px;margin-top:12px}
label:first-child{margin-top:0}
input,textarea,select{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;line-height:1.5;transition:border-color .15s;background:#fff}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(227,30,36,0.08)}
textarea{resize:vertical}
textarea.mono{font-family:'JetBrains Mono',monospace;font-size:12px}
.row{display:flex;gap:8px;align-items:center}
.row .grow{flex:1}

/* 按钮 */
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 16px;border-radius:6px;font-size:13px;font-weight:550;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--fg);transition:all .15s;white-space:nowrap}
.btn:hover{border-color:#ccc;background:#f9fafb}
.btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn.primary:hover{background:#c4191f}
.btn.danger{color:#dc2626;border-color:#fecaca;background:#fff}
.btn.danger:hover{background:#fee2e2}
.btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--fg);background:#f3f4f6}

/* 颜色 */
.color-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.swatch{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);flex-shrink:0}

/* 卡片编辑 */
.card-item{background:var(--bg);border-radius:8px;padding:14px 16px;margin-top:10px}
.card-item h4{font-size:13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}

/* 状态 */
.status{font-size:12px;padding:6px 0;color:var(--muted)}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:20px;font-size:13px;font-weight:550;z-index:999;animation:toastIn .3s ease;pointer-events:none}
.toast.success{background:#166534;color:#fff}
.toast.error{background:#991b1b;color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* 弹窗 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border-radius:14px;padding:24px;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal h4{font-size:16px;margin-bottom:8px}
.modal p{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.modal .row{justify-content:flex-end}
</style>
</head>
<body>

<div class="app">
  <!-- 侧边栏 -->
  <aside class="sidebar">
    <h2>管理后台</h2>
    <nav>
      <a href="#" class="active" data-tab="site" onclick="switchPanel('site')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        网站信息
      </a>
      <a href="#" data-tab="intro" onclick="switchPanel('intro')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        基础介绍
      </a>
      <a href="#" data-tab="req" onclick="switchPanel('req')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg>
        需求详情
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="../" target="_blank">← 返回预览页面</a>
    </div>
  </aside>

  <!-- 主内容 -->
  <main class="main">

    <!-- 网站信息 -->
    <div class="panel active" id="panel-site">
      <h2>网站信息</h2>
      <p class="desc">品牌色、网页名称和底部文案</p>

      <div class="card">
        <h3>品牌色 <span class="hint">点击色块选取</span></h3>
        <div class="color-row"><div class="swatch" id="sw-primary" onclick="pickColor('brand-primary','sw-primary')" style="cursor:pointer"></div><label style="margin:0;width:40px">主色</label><input id="brand-primary" style="flex:1"></div>
        <div class="color-row"><div class="swatch" id="sw-light" onclick="pickColor('brand-light','sw-light')" style="cursor:pointer"></div><label style="margin:0;width:40px">浅色</label><input id="brand-light" style="flex:1"></div>
        <div class="color-row"><div class="swatch" id="sw-dark" onclick="pickColor('brand-dark','sw-dark')" style="cursor:pointer"></div><label style="margin:0;width:40px">深色</label><input id="brand-dark" style="flex:1"></div>
        <div class="row" style="margin-top:10px"><button class="btn ghost" onclick="resetBrand()">恢复默认</button></div>
      </div>

      <div class="card">
        <h3>页面标题与底部</h3>
        <label>网页名称</label><input id="meta-title">
        <label>底部文案（点击可进后台）</label><input id="footer-text">
      </div>
    </div>

    <!-- 基础介绍 -->
    <div class="panel" id="panel-intro">
      <h2>基础介绍</h2>
      <p class="desc">首页展示的标题、描述、标签和功能卡片</p>

      <div class="card">
        <h3>文案</h3>
        <label>页面标题（H1）</label><input id="intro-title">
        <label>副标题</label><textarea id="intro-subtitle" style="min-height:50px"></textarea>
        <label>标签（空格 + # 分隔，如：v2.0 #AI #企业级）</label><input id="intro-tags">
      </div>

      <div class="card">
        <h3>Logo</h3>
        <textarea class="mono" id="intro-logo" style="min-height:60px" placeholder="SVG 代码 或 上传图片"></textarea>
        <div class="row" style="margin-top:8px"><button class="btn" onclick="uploadLogo()">上传 PNG/JPG</button></div>
      </div>

      <div class="card">
        <h3>功能卡片 <button class="btn" onclick="addCard()">+ 添加</button></h3>
        <div id="cards-container"></div>
      </div>
    </div>

    <!-- 需求详情 -->
    <div class="panel" id="panel-req">
      <h2>需求详情</h2>
      <p class="desc">管理 Tab 标签页和编辑 Markdown / JSON 内容</p>

      <div class="card">
        <h3>Tab 管理 <span class="hint" id="tab-count"></span></h3>
        <div class="row" style="margin-bottom:12px">
          <button class="btn" onclick="scanTabs()">刷新扫描</button>
        </div>

        <label>选择文件</label>
        <div class="row"><select id="content-file" onchange="loadContent()" style="flex:1"></select></div>

        <textarea class="mono" id="content-editor" style="margin-top:8px;min-height:240px" placeholder="选择文件进行编辑..."></textarea>

        <div class="row" style="margin-top:10px">
          <button class="btn primary" onclick="saveContent()">保存</button>
          <button class="btn" onclick="newContent()">新建 MD</button>
          <button class="btn" onclick="uploadContent()">上传</button>
          <button class="btn danger" onclick="deleteContent()">删除</button>
        </div>
        <div class="row" style="margin-top:8px">
          <input id="rename-input" placeholder="新文件名（含后缀）" style="flex:1"><button class="btn" onclick="renameContent()">重命名</button>
        </div>
        <div id="content-status" class="status"></div>
      </div>
    </div>

  </main>
</div>

<input type="file" id="logo-upload" accept="image/*" onchange="onLogoUpload(event)" style="display:none">
<input type="file" id="content-upload" accept=".md,.json,.txt" onchange="onContentUpload(event)" style="display:none">
<input type="color" id="color-picker" style="position:absolute;opacity:0;pointer-events:none" onchange="onColorPick(event)">
<div id="toast-container"></div>

<script>
let config = {};
// 自动检测 API 前缀：/prd/manager/ → /prd，/manager/ → 空
var BASE = window.location.pathname.replace(/\/manager\/?.*$/, '');

async function api(method, path, body) {
  const opts = {method, headers:{}};
  if (body !== undefined) { opts.headers['Content-Type'] = body && typeof body === 'object' ? 'application/json' : 'text/plain'; opts.body = typeof body === 'object' ? JSON.stringify(body) : body; }
  const r = await fetch(BASE + '/api' + path, opts);
  if (method === 'DELETE' || (method === 'POST' && (path.startsWith('/content') || path === '/config'))) return r.ok;
  return r.ok ? r.json() : null;
}

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast ' + (type || 'success');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

async function loadConfig() {
  try {
    const r = await fetch(BASE + '/api/config');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    config = await r.json() || {};
    if (!config || typeof config !== 'object') throw new Error('Invalid');
  } catch(e) {
    config = {meta:{title:'',subtitle:'',tags:[],logo:{type:'svg',value:''}},brand:{primary:'#E31E24',light:'#FDEBEC',dark:'#B3151A'},tabs:{files:[],extra:[]},cards:[],footer:{text:''}};
    toast('加载配置失败: ' + e.message, 'error');
  }
  config.meta = config.meta || {}; config.brand = config.brand || {}; config.tabs = config.tabs || {files:[],extra:[]}; config.cards = config.cards || []; config.footer = config.footer || {};
  renderAll();
}

function renderAll() {
  document.getElementById('brand-primary').value = config.brand.primary || '#E31E24';
  document.getElementById('brand-light').value = config.brand.light || '#FDEBEC';
  document.getElementById('brand-dark').value = config.brand.dark || '#B3151A';
  updateSwatches();
  document.getElementById('meta-title').value = config.meta.title || '';
  document.getElementById('footer-text').value = config.footer.text || '';
  document.getElementById('intro-title').value = config.meta.title || '';
  document.getElementById('intro-subtitle').value = config.meta.subtitle || '';
  document.getElementById('intro-tags').value = (config.meta.tags||[]).map(t=>'#'+t).join(' ');
  document.getElementById('intro-logo').value = (config.meta.logo||{}).value || '';
  renderCards();
  loadContentList();
  scanTabs();
}

function updateSwatches() {
  document.getElementById('sw-primary').style.background = config.brand.primary || '#E31E24';
  document.getElementById('sw-light').style.background = config.brand.light || '#FDEBEC';
  document.getElementById('sw-dark').style.background = config.brand.dark || '#B3151A';
}
let _colorTarget = '';
function pickColor(inputId, swatchId) {
  _colorTarget = inputId;
  const picker = document.getElementById('color-picker');
  picker.value = document.getElementById(inputId).value;
  picker.click();
}
function onColorPick(e) {
  if (!_colorTarget) return;
  document.getElementById(_colorTarget).value = e.target.value;
  document.getElementById(_colorTarget).dispatchEvent(new Event('input'));
  _colorTarget = '';
}
document.querySelectorAll('#brand-primary,#brand-light,#brand-dark').forEach(el => {
  el.addEventListener('input', () => { config.brand.primary = document.getElementById('brand-primary').value; config.brand.light = document.getElementById('brand-light').value; config.brand.dark = document.getElementById('brand-dark').value; updateSwatches(); });
});

function resetBrand() {
  config.brand = {primary:'#E31E24',light:'#FDEBEC',dark:'#B3151A'};
  document.getElementById('brand-primary').value = '#E31E24';
  document.getElementById('brand-light').value = '#FDEBEC';
  document.getElementById('brand-dark').value = '#B3151A';
  updateSwatches();
}

// 卡片
const ICONS = ['loop','sse','knowledge','memory','human','evolve','document','chart','cube','module','import','clock'];
function renderCards() {
  const c = document.getElementById('cards-container'); c.innerHTML = '';
  (config.cards||[]).forEach((card,i) => {
    const sel = `<select onchange="config.cards[${i}].icon=this.value" style="flex:1">${ICONS.map(n=>'<option '+(card.icon===n?'selected':'')+'>'+n+'</option>').join('')}</select>`;
    c.innerHTML += `<div class="card-item"><h4>卡片 ${i+1} <button class="btn danger" style="padding:3px 10px;font-size:11px" onclick="config.cards.splice(${i},1);renderCards()">删除</button></h4>
      <label>图标</label>${sel}
      <label>标题</label><input value="${esc(card.title||'')}" onchange="config.cards[${i}].title=this.value">
      <label>描述</label><textarea style="min-height:50px" onchange="config.cards[${i}].description=this.value">${esc(card.description||'')}</textarea></div>`;
  });
}
function addCard() { config.cards.push({icon:'document',title:'新功能',description:'功能描述'}); renderCards(); }

// 内容编辑
async function loadContentList() {
  const sel = document.getElementById('content-file'); sel.innerHTML = '<option value="">-- 选择文件 --</option>';
  const flat = (arr) => (arr||[]).map(x => typeof x === 'string' ? x : (x.file || x));
  const files = [...flat(config.tabs.files), ...(config.tabs.extra||[]).map(t=>t.file)];
  files.forEach(f => { sel.innerHTML += `<option value="${f}">${f}</option>`; });
}

async function loadContent() {
  const f = document.getElementById('content-file').value; if (!f) return;
  const r = await fetch(BASE + '/api/content?file=' + encodeURIComponent(f));
  if (r.ok) { const d = await r.json(); document.getElementById('content-editor').value = d.content; setStatus('已加载 ' + f); }
}

async function saveContent() {
  const f = document.getElementById('content-file').value; if (!f) return;
  await fetch(BASE + '/api/content?file=' + encodeURIComponent(f), {method:'POST',body:document.getElementById('content-editor').value});
  setStatus('已保存 ' + f); toast('已保存 ' + f);
}

async function scanTabs() {
  const r = await fetch(BASE + '/api/scan?folder=tabs');
  if (r.ok) { const d = await r.json(); config.tabs.files = d.files || []; }
  const n = (config.tabs.files||[]).length + (config.tabs.extra||[]).length;
  document.getElementById('tab-count').textContent = `共 ${n} 个 Tab`;
  loadContentList();
}

async function newContent() {
  const name = prompt('文件名（含后缀）:', 'new.md'); if (!name) return;
  const path = 'tabs/' + name;
  await fetch(BASE + '/api/content?file=' + encodeURIComponent(path), {method:'POST',body:'# ' + name.replace('.md','') + '\n\n'});
  config.tabs.files.push(path);
  loadContentList(); document.getElementById('content-file').value = path; loadContent();
  toast('已创建 ' + path);
}

function uploadContent() { document.getElementById('content-upload').click(); }
async function onContentUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const path = 'tabs/' + file.name;
  await fetch(BASE + '/api/content?file=' + encodeURIComponent(path), {method:'POST',body:await file.text()});
  if (!config.tabs.files.includes(path)) config.tabs.files.push(path);
  loadContentList(); document.getElementById('content-file').value = path; loadContent();
  toast('已上传 ' + path); e.target.value = '';
}

async function deleteContent() {
  const f = document.getElementById('content-file').value; if (!f) return;
  if (!confirm('确认删除 ' + f + '？此操作不可逆。')) return;
  await fetch(BASE + '/api/delete?file=' + encodeURIComponent(f));
  config.tabs.files = config.tabs.files.filter(x => x !== f);
  loadContentList(); document.getElementById('content-editor').value = '';
  setStatus('已删除 ' + f); toast('已删除 ' + f, 'error');
}

async function renameContent() {
  const oldF = document.getElementById('content-file').value;
  const newName = document.getElementById('rename-input').value; if (!oldF || !newName) return;
  const newF = 'tabs/' + newName;
  await fetch(BASE + '/api/rename', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({old:oldF,new:newF})});
  const idx = config.tabs.files.indexOf(oldF); if (idx >= 0) config.tabs.files[idx] = newF;
  loadContentList(); document.getElementById('content-file').value = newF;
  document.getElementById('rename-input').value = ''; toast('已重命名: ' + newF);
}

function uploadLogo() { document.getElementById('logo-upload').click(); }
function onLogoUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { document.getElementById('intro-logo').value = ev.target.result; };
  reader.readAsDataURL(file); e.target.value = '';
}

function switchPanel(name) {
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.toggle('active', a.dataset.tab === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
}

function setStatus(msg) { const s = document.getElementById('content-status'); s.textContent = msg; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

loadConfig();
</script>
</body>
</html>
